{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div
    style="max-width: 400px; margin: 4rem auto; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
    <h2 style="text-align: center; margin-bottom: 2rem;">Admin Login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div style="color: red; margin-bottom: 1rem; text-align: center;">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Username</label>
            <input type="text" name="username"
                style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;" required>
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label>Password</label>
            <input type="password" name="password"
                style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;" required>
        </div>
        <button type="submit"
            style="width: 100%; padding: 1rem; background: var(--pink-primary); border: none; border-radius: 8px; color: white; cursor: pointer;">Login</button>
    </form>
</div>
{% endblock %}
