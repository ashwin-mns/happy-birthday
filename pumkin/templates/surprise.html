{% extends "base.html" %}

{% block title %}A Surprise for You!{% endblock %}

{% block content %}
<div class="surprise-container">
    <button id="surprise-btn" class="surprise-btn" onclick="triggerSurprise()">Click for Surprise ✨</button>

    <div id="surprise-message" style="display: none; text-align: center; animation: zoomIn 1s ease;">
        <h1 style="font-size: 4rem; color: var(--pink-dark);">To The Best Friend In The World! 🌙✨</h1>
        <p style="font-size: 1.5rem; margin-top: 1rem;">You are my everything.</p>
        <div style="margin-top: 2rem;">
            <i class="fas fa-heart" style="color: #FFD1DC; font-size: 5rem;"></i>
        </div>
    </div>
</div>

<style>
    @keyframes zoomIn {
        from {
            opacity: 0;
            transform: scale(0.5);
        }

        to {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>
{% endblock %}
