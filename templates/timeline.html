{% extends "base.html" %}

{% block title %}Memory Timeline{% endblock %}

{% block content %}
<div class="container" style="padding: 2rem;">
    <h2 style="text-align: center; font-size: 3rem; color: #FFB7CE; margin-bottom: 2rem;">Our Journey Together</h2>

    <div class="timeline-container">
        {% for memory in memories %}
        <div class="timeline-item">
            <div style="color: var(--pink-dark); font-weight: bold; margin-bottom: 0.5rem;">{{ memory.date }}</div>
            <h3 style="font-family: 'Playfair Display', serif; margin-bottom: 1rem;">{{ memory.title }}</h3>
            <p style="margin-bottom: 1rem;">{{ memory.description }}</p>
            {% if memory.image_filename %}
            <img src="{{ url_for('static', filename='uploads/' + memory.image_filename) }}"
                style="width: 100%; border-radius: 10px;" alt="Memory">
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
